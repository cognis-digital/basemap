apiVersion: apps/v1
kind: Deployment
metadata: { name: basemap, labels: { app: basemap } }
spec:
  replicas: 1
  selector: { matchLabels: { app: basemap } }
  template:
    metadata: { labels: { app: basemap } }
    spec:
      containers:
        - name: basemap
          image: ghcr.io/cognis-digital/basemap:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: basemap }
spec:
  selector: { app: basemap }
  ports: [{ port: 80, targetPort: 8000 }]
